<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Drink Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --card: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text-muted: #8892b0;
            --beer: #f0a500;
            --wine: #9b2335;
            --cocktail: #00b4d8;
            --liquor: #7b2d8e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 24px 16px 12px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        header .date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .today-count {
            text-align: center;
            padding: 8px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .today-count span {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.3rem;
        }

        .drink-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            padding: 16px 20px;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .drink-btn {
            background: var(--surface);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .drink-btn:active {
            transform: scale(0.95);
        }

        .drink-btn .emoji {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 8px;
        }

        .drink-btn .label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .drink-btn.beer { border-color: var(--beer); box-shadow: 0 0 12px rgba(240,165,0,0.15); }
        .drink-btn.wine { border-color: var(--wine); box-shadow: 0 0 12px rgba(155,35,53,0.15); }
        .drink-btn.cocktail { border-color: var(--cocktail); box-shadow: 0 0 12px rgba(0,180,216,0.15); }
        .drink-btn.liquor { border-color: var(--liquor); box-shadow: 0 0 12px rgba(123,45,142,0.15); }

        .drink-btn.beer:active { background: rgba(240,165,0,0.15); }
        .drink-btn.wine:active { background: rgba(155,35,53,0.15); }
        .drink-btn.cocktail:active { background: rgba(0,180,216,0.15); }
        .drink-btn.liquor:active { background: rgba(123,45,142,0.15); }

        .flash {
            animation: flash 0.4s ease-out;
        }

        @keyframes flash {
            0% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Nav */
        nav {
            margin-top: auto;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        nav button {
            background: var(--card);
            border: none;
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        nav button:active, nav button.active {
            background: var(--accent);
        }

        /* Report view */
        .report-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 50;
            overflow-y: auto;
            padding: 20px;
        }

        .report-overlay.visible {
            display: block;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .report-header h2 {
            font-size: 1.2rem;
        }

        .close-btn {
            background: var(--card);
            border: none;
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .report-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .report-tabs button {
            flex: 1;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .report-tabs button.active {
            background: var(--accent);
            color: var(--text);
            border-color: var(--accent);
        }

        .stat-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .stat-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .stat-row .type {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .stat-row .count {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .stat-total {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
            padding-top: 10px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 120px;
            margin-top: 12px;
        }

        .bar-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            max-width: 32px;
            border-radius: 6px 6px 0 0;
            min-height: 2px;
            transition: height 0.3s;
        }

        .bar-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: center;
        }

        .bar-value {
            font-size: 0.7rem;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state .emoji { font-size: 2rem; margin-bottom: 12px; }

        /* Undo bar */
        .undo-bar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 8px 12px 8px 16px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 100;
            font-size: 0.85rem;
        }

        .undo-bar.show { display: flex; }

        .undo-bar button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>🍹 Drink Tracker</h1>
    <div class="date" id="today-date"></div>
</header>

<div class="today-count">
    Today: <span id="today-total">0</span> drinks
</div>

<div class="drink-grid">
    <div class="drink-btn beer" onclick="logDrink('beer')" role="button" tabindex="0">
        <span class="emoji">🍺</span>
        <span class="label">Beer</span>
    </div>
    <div class="drink-btn wine" onclick="logDrink('wine')" role="button" tabindex="0">
        <span class="emoji">🍷</span>
        <span class="label">Wine</span>
    </div>
    <div class="drink-btn cocktail" onclick="logDrink('cocktail')" role="button" tabindex="0">
        <span class="emoji">🍸</span>
        <span class="label">Cocktail</span>
    </div>
    <div class="drink-btn liquor" onclick="logDrink('liquor')" role="button" tabindex="0">
        <span class="emoji">🥃</span>
        <span class="label">Liquor</span>

</div>

<div class="toast" id="toast"></div>
<div class="undo-bar" id="undo-bar">
    <span id="undo-text">Logged 1 beer</span>
    <button onclick="undoLast()">Undo</button>
</div>

<nav>
    <button onclick="showReport('daily')">📅 Daily</button>
    <button onclick="showReport('weekly')">📊 Weekly</button>
    <button onclick="showReport('monthly')">📈 Monthly</button>
</nav>

<!-- About overlay -->
<div class="report-overlay" id="about-overlay">
    <div class="report-header">
        <h2>About</h2>
        <button class="close-btn" onclick="closeAbout()">✕</button>
    </div>
    <div class="stat-card" style="text-align:center;">
        <h3>Share this app</h3>
        <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:16px;">Scan to open Drink Tracker</p>
        <canvas id="qr-canvas" style="margin:0 auto; display:block; border-radius:8px;"></canvas>
    </div>
    <div class="stat-card">
        <h3>Links</h3>
        <div style="padding:8px 0;">
            <a href="https://github.com/rbowen/alc-count" target="_blank" rel="noopener"
               style="color:var(--cocktail); text-decoration:none; font-size:0.95rem; display:flex; align-items:center; gap:8px;">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub Repository
            </a>
        </div>
        <div style="padding:8px 0;">
            <a href="https://rbowen.github.io/alc-count/" target="_blank" rel="noopener"
               style="color:var(--cocktail); text-decoration:none; font-size:0.95rem; display:flex; align-items:center; gap:8px;">
                🌐 App URL
            </a>
        </div>
    </div>
    <div class="stat-card" style="text-align:center;">
        <p style="color:var(--text-muted); font-size:0.8rem;">Drink Tracker v1.0</p>
        <p style="color:var(--text-muted); font-size:0.75rem; margin-top:4px;">Data stored locally on your device.</p>
    </div>
</div>

<div class="report-overlay" id="report-overlay">
    <div class="report-header">
        <h2 id="report-title">Report</h2>
        <button class="close-btn" onclick="showAbout()" style="font-size:0.85rem; width:auto; padding:0 12px; border-radius:10px;">ℹ️ About</button>
        <button class="close-btn" onclick="closeReport()">✕</button>
    </div>
    <div class="report-tabs" id="report-tabs">
        <button class="active" onclick="switchReportTab('daily')">Daily</button>
        <button onclick="switchReportTab('weekly')">Weekly</button>
        <button onclick="switchReportTab('monthly')">Monthly</button>
    </div>
    <div id="report-content"></div>
</div>

<script>
// ─── Data Layer (IndexedDB) ───────────────────────────────────

const DB_NAME = 'drinkTracker';
const DB_VERSION = 1;
const STORE = 'drinks';

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE)) {
                const store = db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
                store.createIndex('date', 'date');
                store.createIndex('type', 'type');
            }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

// Local date helper: returns YYYY-MM-DD in the device's local timezone
function localDateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

async function addDrink(type) {
    const db = await openDB();
    const now = new Date();
    const record = {
        type: type,
        date: localDateStr(now),                   // YYYY-MM-DD local
        time: now.toLocaleTimeString('en-GB'),     // HH:MM:SS local
        timestamp: now.getTime()
    };
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        const req = tx.objectStore(STORE).add(record);
        req.onsuccess = () => { record.id = req.result; resolve(record); };
        req.onerror = () => reject(req.error);
    });
}

async function removeDrink(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        const req = tx.objectStore(STORE).delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

async function getDrinks(startDate, endDate) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readonly');
        const store = tx.objectStore(STORE);
        const index = store.index('date');
        const range = IDBKeyRange.bound(startDate, endDate);
        const req = index.getAll(range);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function getTodayCount() {
    const today = localDateStr(new Date());
    const drinks = await getDrinks(today, today);
    return drinks.length;
}

// ─── UI Logic ─────────────────────────────────────────────────

let lastEntry = null;
let undoTimeout = null;

function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

document.getElementById('today-date').textContent = formatDate(new Date());

async function updateTodayCount() {
    document.getElementById('today-total').textContent = await getTodayCount();
}
updateTodayCount();

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
}

async function logDrink(type) {
    const btn = document.querySelector(`.drink-btn.${type}`);
    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');

    const entry = await addDrink(type);
    lastEntry = entry;
    await updateTodayCount();

    // Show undo bar
    const undoBar = document.getElementById('undo-bar');
    const emoji = { beer: '🍺', wine: '🍷', cocktail: '🍸', liquor: '🥃' }[type];
    document.getElementById('undo-text').textContent = `Logged ${emoji} ${type}`;
    undoBar.classList.add('show');
    clearTimeout(undoTimeout);
    undoTimeout = setTimeout(() => {
        undoBar.classList.remove('show');
        lastEntry = null;
    }, 5000);
}

async function undoLast() {
    if (!lastEntry) return;
    await removeDrink(lastEntry.id);
    lastEntry = null;
    document.getElementById('undo-bar').classList.remove('show');
    clearTimeout(undoTimeout);
    await updateTodayCount();
    showToast('Undone ✓');
}

// ─── Reports ──────────────────────────────────────────────────

const TYPES = ['beer', 'wine', 'cocktail', 'liquor'];
const EMOJIS = { beer: '🍺', wine: '🍷', cocktail: '🍸', liquor: '🥃' };
const COLORS = { beer: '#f0a500', wine: '#9b2335', cocktail: '#00b4d8', liquor: '#7b2d8e' };

let currentReportTab = 'daily';

function showReport(tab) {
    currentReportTab = tab;
    document.getElementById('report-overlay').classList.add('visible');
    renderReport(tab);
    // Update tab buttons
    document.querySelectorAll('.report-tabs button').forEach((b, i) => {
        b.classList.toggle('active', ['daily','weekly','monthly'][i] === tab);
    });
}

function closeReport() {
    document.getElementById('report-overlay').classList.remove('visible');
}

function switchReportTab(tab) {
    showReport(tab);
}

function dateStr(d) {
    return localDateStr(d);
}

function startOfWeek(d) {
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
    return new Date(d.getFullYear(), d.getMonth(), diff);
}

async function renderReport(tab) {
    const container = document.getElementById('report-content');
    const now = new Date();

    if (tab === 'daily') {
        document.getElementById('report-title').textContent = 'Daily Report';
        const today = dateStr(now);
        const drinks = await getDrinks(today, today);
        container.innerHTML = renderBreakdown(drinks, 'Today');

        // Also show last 7 days chart
        const days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(now);
            d.setDate(d.getDate() - i);
            days.push(d);
        }
        const dayData = [];
        for (const d of days) {
            const ds = dateStr(d);
            const dr = await getDrinks(ds, ds);
            dayData.push({ label: d.toLocaleDateString('en-US', { weekday: 'short' }), count: dr.length });
        }
        container.innerHTML += renderBarChart(dayData, 'Last 7 Days');

    } else if (tab === 'weekly') {
        document.getElementById('report-title').textContent = 'Weekly Report';
        const weekStart = startOfWeek(now);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 6);
        const drinks = await getDrinks(dateStr(weekStart), dateStr(weekEnd));
        container.innerHTML = renderBreakdown(drinks, `Week of ${weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`);

        // Bar chart by day of the week
        const dayData = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(weekStart);
            d.setDate(d.getDate() + i);
            const ds = dateStr(d);
            const dr = await getDrinks(ds, ds);
            dayData.push({ label: d.toLocaleDateString('en-US', { weekday: 'short' }), count: dr.length });
        }
        container.innerHTML += renderBarChart(dayData, 'This Week by Day');

    } else if (tab === 'monthly') {
        document.getElementById('report-title').textContent = 'Monthly Report';
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        const drinks = await getDrinks(dateStr(monthStart), dateStr(monthEnd));
        container.innerHTML = renderBreakdown(drinks, now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }));

        // Bar chart by week of the month
        const weeks = [];
        let ws = new Date(monthStart);
        let weekNum = 1;
        while (ws <= monthEnd) {
            const we = new Date(ws);
            we.setDate(we.getDate() + 6);
            const actualEnd = we > monthEnd ? monthEnd : we;
            const dr = await getDrinks(dateStr(ws), dateStr(actualEnd));
            weeks.push({ label: `Wk ${weekNum}`, count: dr.length });
            ws.setDate(ws.getDate() + 7);
            weekNum++;
        }
        container.innerHTML += renderBarChart(weeks, 'This Month by Week');
    }
}

function renderBreakdown(drinks, periodLabel) {
    const counts = { beer: 0, wine: 0, cocktail: 0, liquor: 0 };
    drinks.forEach(d => counts[d.type]++);
    const total = drinks.length;

    if (total === 0) {
        return `
            <div class="empty-state">
                <div class="emoji">🎉</div>
                <p>No drinks logged for ${periodLabel}.</p>
            </div>`;
    }

    let rows = TYPES.map(t => `
        <div class="stat-row">
            <div class="type">${EMOJIS[t]} ${t.charAt(0).toUpperCase() + t.slice(1)}</div>
            <div class="count" style="color:${COLORS[t]}">${counts[t]}</div>
        </div>
    `).join('');

    return `
        <div class="stat-card">
            <h3>${periodLabel}</h3>
            ${rows}
            <div class="stat-total">
                <span>Total</span>
                <span style="color:var(--accent)">${total}</span>
            </div>
        </div>`;
}

function renderBarChart(data, title) {
    const max = Math.max(...data.map(d => d.count), 1);
    const bars = data.map(d => {
        const h = (d.count / max) * 100;
        return `
            <div class="bar-col">
                <div class="bar-value">${d.count || ''}</div>
                <div class="bar" style="height:${h}%; background: var(--accent);"></div>
                <div class="bar-label">${d.label}</div>
            </div>`;
    }).join('');

    return `
        <div class="stat-card">
            <h3>${title}</h3>
            <div class="bar-chart">${bars}</div>
        </div>`;
}

// ─── Service Worker Registration ──────────────────────────────

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// ─── About Screen ─────────────────────────────────────────────

function showAbout() {
    document.getElementById('about-overlay').classList.add('visible');
    generateQR('https://rbowen.github.io/alc-count/', document.getElementById('qr-canvas'));
}

function closeAbout() {
    document.getElementById('about-overlay').classList.remove('visible');
}

// ─── Minimal QR Code Generator ────────────────────────────────
// Generates a version 3 (29x29) QR code, sufficient for short URLs.

function generateQR(text, canvas) {
    // Use a tiny inline QR encoder for short alphanumeric strings
    // For simplicity and zero dependencies, we draw using a well-known
    // JS QR library pattern inlined below.

    const size = 200;
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);

    // Encode using the QR code API as a data URL workaround:
    // We'll use a Google Charts-style approach via an img load
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
    };
    img.onerror = () => {
        // Fallback: draw the URL as text
        ctx.fillStyle = '#1a1a2e';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(text, size/2, size/2);
    };
    // Use the open-source QR code API
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&bgcolor=ffffff&color=1a1a2e`;
}
</script>
